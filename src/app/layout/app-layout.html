<!-- Shell: fills viewport, no document-level scroll -->
<div class="flex h-full flex-col overflow-hidden">
  <!-- Header -->
  <header class="z-5 shrink-0 border-b border-gray-200 bg-background-secondary dark:border-black">
    <div class="flex h-16 items-center">
      <!-- Logo zone: pinned left, mirrors the sidebar width -->
      <div class="flex shrink-0 items-center px-4 lg:w-64">
        <a routerLink="/" class="flex items-baseline gap-1.5 select-none pl-4">
          <span class="text-xl font-bold tracking-tight text-foreground">Fibo</span>
          <span class="text-xl font-bold tracking-tight text-blue-500">UI</span>
        </a>
      </div>

      <!-- Central zone: mirrors the main content column (px-2 = main's 8px scrollbar gutters) -->
      <div class="flex min-w-0 flex-1 items-center px-2">
        <div class="mx-auto flex w-full items-center justify-end px-8">
          <app-theme-toggle></app-theme-toggle>
        </div>
      </div>

      <!-- Right spacer: mirrors the TOC sidebar -->
      <div class="hidden w-56 shrink-0 xl:block"></div>
    </div>
  </header>

  <!-- Body: fills remaining space below header -->
  <div class="flex min-h-0 flex-1">
    <!-- Left sidebar: independent scroll -->
    <aside class="hidden w-64 shrink-0 overflow-y-auto border-r border-gray-200 dark:border-black lg:block">
      <div class="py-4 pr-2 pl-4">
        <app-root-nav></app-root-nav>
      </div>
    </aside>

    <!-- Main content: independent scroll -->
    <main class="flex-1 overflow-y-auto [scrollbar-gutter:stable_both-edges]" #mainContent>
      <div class="mx-auto max-w-4xl px-8 py-8">
        <router-outlet></router-outlet>
      </div>
    </main>

    <!-- Right sidebar: "On this page" TOC -->
    <aside class="hidden w-56 shrink-0 overflow-y-auto border-l border-gray-200 dark:border-black xl:block">
      <div class="py-8 pr-4 pl-4">
        <app-table-of-contents
          [entries]="tocService.entries()"
          [scrollContainer]="mainContent"
        />
      </div>
    </aside>
  </div>
</div>
