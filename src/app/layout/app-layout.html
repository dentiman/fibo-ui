<!-- Shell: fills viewport, no document-level scroll -->
<div class="flex h-full flex-col overflow-hidden">
  <!-- Header -->
  <header class="z-5 shrink-0 border-b border-gray-200 bg-background-secondary dark:border-black">
    <div class="flex h-16 items-center">
      <!-- Logo zone: pinned left, mirrors the sidebar width -->
      <div class="flex shrink-0 items-center gap-2.5 px-6 lg:w-64">
        <a routerLink="/" class="flex items-baseline gap-0.5 select-none">
          <span class="text-[19px] font-bold tracking-tight text-foreground">Fibo</span>
          <span class="text-[19px] font-bold tracking-tight text-blue-500">ui</span>
        </a>
        <span
          class="rounded-md border border-gray-200 px-1.5 py-0.5 font-mono text-[10px] font-medium tracking-tight text-foreground-tertiary dark:border-white/10"
        >
          v0.9 beta
        </span>
      </div>

      <!-- Central zone: search (mirrors the main content column) -->
      <div class="flex min-w-0 flex-1 items-center px-4">

      </div>

      <!-- Right actions: GitHub star + theme toggle (mirrors the TOC sidebar) -->
      <div class="flex shrink-0 items-center justify-end gap-2 px-4 xl:w-56">
        <a
          href="https://github.com/dentiman/fibo-ui"
          target="_blank"
          rel="noopener"
          class="flex h-9 items-center gap-2 rounded-lg border border-gray-200 px-3 text-sm font-medium text-foreground-secondary transition-colors hover:bg-black/5 hover:text-foreground dark:border-white/10 dark:hover:bg-white/5"
          title="Star fibo-ui on GitHub"
        >
          <svg class="size-4 shrink-0" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49 0-.24-.01-.88-.01-1.73-2.78.62-3.37-1.37-3.37-1.37-.45-1.18-1.11-1.5-1.11-1.5-.91-.63.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.36-2.22-.26-4.55-1.14-4.55-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05a9.4 9.4 0 0 1 2.5-.34c.85 0 1.71.12 2.5.34 1.91-1.33 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.94.68 1.9 0 1.37-.01 2.48-.01 2.82 0 .27.18.6.69.49A10.26 10.26 0 0 0 22 12.25C22 6.58 17.52 2 12 2z" />
          </svg>
          <span class="hidden sm:inline">Star</span>
          <svg class="size-3.5 shrink-0 text-amber-400" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 3.5l2.6 5.27 5.82.85-4.21 4.1.99 5.79L12 16.77l-5.2 2.74.99-5.79-4.21-4.1 5.82-.85z" />
          </svg>
        </a>
        <app-theme-toggle></app-theme-toggle>
      </div>
    </div>
  </header>

  <!-- Body: fills remaining space below header -->
  <div class="flex min-h-0 flex-1">
    <!-- Left sidebar: independent scroll -->
    <aside class="hidden w-64 shrink-0 overflow-y-auto border-r border-gray-200 dark:border-black bg-white dark:bg-transparent lg:block">
      <div class="py-4 pr-2 pl-4">
        <app-root-nav></app-root-nav>
      </div>
    </aside>

    <!-- Main content: independent scroll -->
    <main class="flex-1 overflow-y-auto [scrollbar-gutter:stable_both-edges]" #mainContent>
      <div class="mx-auto max-w-4xl px-8 py-8">
        <router-outlet></router-outlet>
      </div>
    </main>

    <!-- Right sidebar: "On this page" TOC -->
    <aside class="hidden w-56 shrink-0 overflow-y-auto border-l border-gray-200 dark:border-black xl:block">
      <div class="py-8 pr-4 pl-4">
        <app-table-of-contents
          [entries]="tocService.entries()"
          [scrollContainer]="mainContent"
        />
      </div>
    </aside>
  </div>
</div>
