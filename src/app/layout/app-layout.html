<!-- Shell: fills viewport, no document-level scroll -->
<div class="flex h-full flex-col overflow-hidden">
  <!-- Header -->
  <header class="z-5 shrink-0 border-b border-gray-200 bg-background-secondary dark:border-black">
    <div class="relative mx-auto flex h-16 max-w-8/10 items-center justify-between px-4 sm:px-6 lg:px-8">
      <img ngSrc="/logo.png" width="40" height="40" alt="Hypermoon" class="h-12 w-auto" priority />
      <div class="flex items-center gap-x-8">
        <app-theme-toggle></app-theme-toggle>
        <button type="button" class="-m-2.5 p-2.5 text-gray-400 hover:text-gray-500 dark:hover:text-white">
          <span class="sr-only">View notifications</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="size-6">
            <path d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <a href="#" class="-m-1.5 p-1.5">
          <span class="sr-only">Your profile</span>
          <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" alt="" class="size-8 rounded-full bg-gray-800 outline -outline-offset-1 outline-black/5 dark:outline-white/10" />
        </a>
      </div>
    </div>
  </header>

  <!-- Body: fills remaining space below header -->
  <div class="flex min-h-0 flex-1">
    <!-- Left sidebar: independent scroll -->
    <aside class="hidden w-64 shrink-0 overflow-y-auto border-r border-gray-200 dark:border-black lg:block">
      <div class="py-4 pr-2 pl-4">
        <app-root-nav></app-root-nav>
      </div>
    </aside>

    <!-- Main content: independent scroll -->
    <main class="flex-1 overflow-y-auto" #mainContent>
      <div class="mx-auto max-w-4xl px-8 py-8">
        <router-outlet></router-outlet>
      </div>
    </main>

    <!-- Right sidebar: "On this page" TOC -->
    <aside class="hidden w-56 shrink-0 overflow-y-auto border-l border-gray-200 dark:border-black xl:block">
      <div class="py-8 pr-4 pl-4">
        <app-table-of-contents
          [entries]="tocService.entries()"
          [scrollContainer]="mainContent"
        />
      </div>
    </aside>
  </div>
</div>
