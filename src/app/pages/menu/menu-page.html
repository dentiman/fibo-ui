<button class="btn mr-1" fiboPopoverTriggerToggle #menu="PopoverTrigger">Open Custom menu</button>
@if (menu.isOpen()) {
      <fibo-menu [popoverTrigger]="menu">
          <a fiboMenuItem [routerLink]="'/select'"> Select</a>
      <a fiboMenuItem [routerLink]="'/select-multiple'"> Select Multiple</a>
  </fibo-menu>
}

<button class="btn btn-primary" fiboPopoverTriggerToggle #menu3="PopoverTrigger">Open Complex Menu</button>
@if (menu3.isOpen()) {
  <fibo-menu [popoverTrigger]="menu3" placement="bottom-start" [items]="items()">
  </fibo-menu>
}
