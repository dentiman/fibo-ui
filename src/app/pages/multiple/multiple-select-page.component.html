<app-form-actions [ctrl]="ctrl">

    <div class="relative mt-2 w-[350px] space-y-2">
      <span  class="block text-sm/6 font-medium text-gray-900">With placeholder</span>
      <sui-multiple-select [items]="users"  [formControl]="ctrl"  placeholder="Choose Cities"></sui-multiple-select>

      <span  class="block text-sm/6 font-medium text-gray-900 mt-2">Floating label</span>
      <sui-multiple-select [items]="users"  [label]="'Cities'"  [formControl]="ctrl" placeholder="Choose Cities"></sui-multiple-select>

      <span  class="block text-sm/6 font-medium text-gray-900 mt-2">Fixed label</span>
      <sui-multiple-select [items]="users"  fixedLabel="Cities" placeholder="Choose Cities"  [formControl]="ctrl"></sui-multiple-select>

      <span  class="block text-sm/6 font-medium text-gray-900 mt-2">Searchable + Label</span>
      <sui-multiple-select [items]="users"  [label]="'City'" [formControl]="ctrl">
        <input type="text" suiMultipleSelectInput  [placeholder]="'Choose City'" (valueChange)="onValueChange( $event)">
      </sui-multiple-select>

      <span  class="block text-sm/6 font-medium text-gray-900 mt-2">Searchable</span>
      <sui-multiple-select [items]="users"  [formControl]="ctrl">
        <input type="text" suiMultipleSelectInput  [placeholder]="'Choose City'" (valueChange)="onValueChange( $event)">
      </sui-multiple-select>

      <span  class="block text-sm/6 font-medium text-gray-900 mt-2">User Multiple Select with Custom Template</span>
      <sui-multiple-select
        [items]="users"
        [formControl]="ctrl"
        [label]="'Select Users'"
        [placeholder]="'Choose users'"
        [valueProp]="valueProp"
        [labelProp]="labelProp"
        [itemTemplate]="userTemplate">
      </sui-multiple-select>

      <span  class="block text-sm/6 font-medium text-gray-900 mt-2">User Multiple Select with Search</span>
      <sui-multiple-select
        [items]="filteredItems()"
        [formControl]="ctrl"
        [label]="'Search Users'"
        [placeholder]="'Search and select users'"
        [valueProp]="valueProp"
        [labelProp]="labelProp"
        [itemTemplate]="userTemplate">
        <input
          type="text"
          suiMultipleSelectInput
          [placeholder]="'Search users...'"
          (valueChange)="onValueChange( $event)">
      </sui-multiple-select>

      <span  class="block text-sm/6 font-medium text-gray-900 mt-2">User Multiple Select with Custom Selected Template</span>
      <sui-multiple-select
        [items]="users"
        [formControl]="ctrl"
        [label]="'Select Users with Custom Display'"
        [placeholder]="'Choose users'"
        [valueProp]="valueProp"
        [labelProp]="labelProp"
        [itemTemplate]="userTemplate"
        [selectedItemTemplate]="selectedUserTemplate">
      </sui-multiple-select>
    </div>

</app-form-actions>

<!-- User Template -->
<ng-template #userTemplate let-user let-isSelected="isSelected">
  <div class="flex items-center gap-3">
    <img
      [src]="user.avatar"
      [alt]="user.username"
      class="w-8 h-8 rounded-full object-cover"
    />
    <div class="flex flex-col min-w-0">
      <span class="text-sm font-medium truncate" >{{ user.username }}</span>
      <span class="text-xs truncate">{{ user.email }}</span>
    </div>
  </div>
</ng-template>

<!-- Selected User Template -->
<ng-template #selectedUserTemplate let-user>
  <div class="flex items-center gap-1">
    <img
      [src]="user.avatar"
      [alt]="user.username"
      class="size-5 rounded-full object-cover"
    />
    <span class="text-xs font-medium">{{ user.username }}</span>
  </div>
</ng-template>
