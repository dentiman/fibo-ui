@for (item of items(); track idx; let idx = $index) {
  @if (item.children || item.content) {
    <button
      fiboSubmenuTrigger
      role="menuitem"
      [content]="subTpl"
      [disabled]="!!item.disabled"
      class="datalist-item py-1 px-2 w-full rounded-md items-center group text-sm text-left"
    >
      @if (item?.icon) {
        <lucide-icon
          [name]="item.icon"
          class="absolute self-center text-foreground-secondary mt-2 size-4"
        ></lucide-icon>
      }
      <div class="min-w-0 grow text-left" [class.ml-6]="itemsHaveIcons()">
        {{ item.label }}
      </div>

      <lucide-icon
        name="chevron-right"
        class="flex-none text-foreground-secondary  group-data-active:text-foreground size-4 shrink-0"
      ></lucide-icon>
    </button>

    <ng-template #subTpl let-overlay>
      <fibo-menu [overlay]="overlay" [menuContent]="item.content" [items]="item.children" />
    </ng-template>

  } @else {
    @if (item.url) {
      <button
        type="button"
        fiboDataListItem
        role="menuitem"
        [value]="item"
        [disabled]="!!item.disabled"
        (click)="navigate(item.url)"
        class="datalist-item w-full text-left"
      >
        <span [class.ml-6]="itemsHaveIcons()">{{ item.label }}</span>
      </button>
    } @else if (item.callback) {
      <button
        type="button"
        class="datalist-item py-1 px-2 rounded-md relative group text-sm w-full text-left"
        fiboDataListItem
        role="menuitem"
        [disabled]="!!item.disabled"
        (click)="item.callback(); menuPanel.closeAllSoon()"
      >
        <span [class.ml-6]="itemsHaveIcons()">{{ item.label }}</span>
      </button>
    } @else if (item.value !== undefined) {
      <button
        type="button"
        class="datalist-item py-1 px-2 rounded-md relative group text-sm w-full text-left"
        fiboDataListItem
        role="menuitem"
        [disabled]="!!item.disabled"
        [value]="item.value"
        (click)="menuPanel.closeAllSoon()"
      >
        <span [class.ml-6]="itemsHaveIcons()">{{ item.label }}</span>
      </button>
    }
  }
}
<ng-content></ng-content>
@if (menuContent()) {
  <ng-container [ngTemplateOutlet]="menuContent()"></ng-container>
}
