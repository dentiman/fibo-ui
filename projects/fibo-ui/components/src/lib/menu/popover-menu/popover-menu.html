@for (item of items(); track idx; let idx = $index) {
  @if (item.children || item.content) {
    <button fiboSubmenuTrigger [disabled]="!!item.disabled" #menuItemTrigger="submenuTrigger"
            class="datalist-item py-1 px-2 w-full rounded-md  items-center  group text-sm"
    >
      @if (item?.icon) {
        <lucide-icon [name]="item.icon"
                     class="absolute self-center text-foreground-secondary  mt-2 size-4"></lucide-icon>
      }
      <div
        class="min-w-0 grow text-left"
        [class.ml-6]="itemsHaveIcons()"

      >{{ item.label }}
      </div>

      <lucide-icon
        name="chevron-right"
        class="flex-none text-foreground-secondary  group-data-active:text-foreground size-4 shrink-0"
      ></lucide-icon>
    </button>
    <ng-template fiboPortalContent [(isOpen)]="menuItemTrigger.isOpen">
      <fibo-menu
        (closeParent)="closeMenuWithParent()"
        [trigger]="menuItemTrigger.popoverTrigger"
        [offset]="1"
        placement="right-start"
        [menuContent]="item.content"
        [items]="item.children"
      />
    </ng-template>
  } @else {
    @if (item.url) {
      <a fiboOption [value]="item" [disabled]="!!item.disabled" (itemTrigger)="closeMenuWithParent()" [routerLink]="item.url"
         class="datalist-item py-1 px-2 rounded-md relative group text-sm">
        <span [class.ml-6]="itemsHaveIcons()">{{ item.label }}</span>
      </a>
    } @else if (item.callback) {
      <a class="datalist-item py-1 px-2 rounded-md relative group text-sm"
         fiboOption [disabled]="!!item.disabled"
         (itemTrigger)="item.callback(); closeMenuWithParent()">
        <span [class.ml-6]="itemsHaveIcons()">{{ item.label }}</span>
      </a>
    } @else if (item.value !== undefined) {
      <a class="datalist-item py-1 px-2 rounded-md relative group text-sm"
         fiboOption [disabled]="!!item.disabled"
         [value]="item.value"
         (itemTrigger)="closeMenuWithParent()">
        <span [class.ml-6]="itemsHaveIcons()">{{ item.label }}</span>
      </a>
    }
  }
}
<ng-content></ng-content>
@if (menuContent()) {
  <ng-container [ngTemplateOutlet]="menuContent()"></ng-container>
}
