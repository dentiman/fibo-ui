<fibo-form-field

  appendIcon="calendar-range"
  fiboPopoverTriggerClick #trigger="PopoverTrigger">
  <div class="flex items-start justify-start" >
    <input
      fiboFormFieldContent
      [value]="value()?.startDate"
      type="text"
      class="w-19 appearance-none outline-none fibo-input placeholder:text-xs focus:outline-0 sm:text-sm/6"
      placeholder="YYYY-MM-DD"
    />
    <span class=" flex  items-center  mx-1   text-gray-400 text-center ">-</span>
    <input
      [value]="value()?.endDate"
      type="text"
      class="w-full pl-1 appearance-none outline-none text-base fibo-input placeholder:text-xs  focus:outline-0 sm:text-sm/6"
      placeholder="YYYY-MM-DD"
    />
  </div>
</fibo-form-field>

@if (trigger.isOpen()) {
    <fibo-calendar
      fiboPopover [popoverTrigger]="trigger"
      class="fibo-popover rounded-md"
      #dataList="DataList"
      [(fiboCalendarDateRangeSelectionModel)]="value"
      [minDate]="minDate()"
      [maxDate]="maxDate()"
    />
}
