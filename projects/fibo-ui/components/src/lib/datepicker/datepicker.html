<fibo-form-field
  [control]="formFieldControl"
  appendIcon="calendar-days"
  fiboPopoverTriggerClick #trigger="PopoverTrigger">
  <input
    fiboFormFieldContent
    type="text"
    [(ngModel)]="value"
    class="w-full appearance-none outline-none text-base fibo-input focus:outline-0 sm:text-sm/6"
    (focus)="trigger.open()"
    [placeholder]="'YYYY-MM-DD'"
  />
</fibo-form-field>

@if (trigger.isOpen()) {
    <fibo-calendar
      fiboPopover [popoverTrigger]="trigger"
      class="fibo-popover rounded-md"
      #dataList="DataList"
      [(fiboCalendarDateSelectionModel)]="value"
      [minDate]="minDate()"
      [maxDate]="maxDate()"
      (optionTriggered)="dateChange.emit();trigger.close()"
    />
}
