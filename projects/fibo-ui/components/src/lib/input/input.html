<fibo-form-field
  [control]="formFieldControl">
  <input
    fiboFormFieldContent
    type="text"
    [value]="value()"
    (input)="onInput($event)"
    (blur)="formFieldControl.cva.onTouched()"
    [disabled]="formFieldControl.cva.disabled()"
    class="w-full appearance-none outline-none text-sm   focus:outline-0 "
    [placeholder]="formFieldControl.placeholder()"
  />
</fibo-form-field>
