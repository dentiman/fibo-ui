@let tooltipRef = tooltipService.tooltipRef();
@if (tooltipRef ) {
  <div fiboPopoverPosition
       [referenceElement]="tooltipRef.referenceElement"
       [placement]="tooltipRef.placement"
       (mouseleave)="tooltipService.close()"
       (mouseenter)="tooltipService.keepOpen()"
       class="absolute  z-10 rounded-md bg-background-tertiary
          shadow-sm  inset-ring inset-ring-gray-950/10 dark:inset-ring-white/5  px-2.5 py-1 text-sm text-foreground"
  >

    <div PopoverArrow
         class="absolute w-3 h-3 bg-background-tertiary border-gray-950/10 dark:border-white/5  rotate-45
                data-[placement=top]:border-r    data-[placement=top]:border-b
                data-[placement=bottom]:border-l data-[placement=bottom]:border-t
                data-[placement=right]:border-l  data-[placement=right]:border-b
                data-[placement=left]:border-r   data-[placement=left]:border-t"
    >
    </div>
    @if ( content() ) {
      {{ tooltipRef.content }}
    } @else if (templateRef()) {
      <ng-container *ngTemplateOutlet="templateRef()"></ng-container>
    }

  </div>

}
