@let values = value() || [];
@let disabled = formFieldControl.cva.disabled();
@let empty  = (values | isEmpty);

<fibo-form-field
  appendIcon="chevron-down"
  [control]="formFieldControl"
  fiboPopoverTriggerClick #trigger="PopoverTrigger">
  <span class="w-full flex flex-wrap gap-x-1  gap-y-1 "
        [class]="{
         '-ml-1.5': !empty,
         'mt-1': !empty && formFieldControl.label(),
        }"
  >
        @for (value of values; track value) {
                <button class="break-words focus-visible:outline flex items-center gap-1 fibo-btn-chip">
                      <span class="truncate flex-1">
                        @let item = selectedItem(value);
                        @if(item) {
                          @if (selectedItemTemplate(); as template) {
                            <ng-container [ngTemplateOutlet]="template" [ngTemplateOutletContext]="{ $implicit: item }"></ng-container>
                          } @else {
                             <span class="text-sm">{{ getLabel(item) }}</span>
                          }
                        }
                      </span>

                      @if (!disabled) {
                        <button class="rounded-full cursor-pointer flex-shrink-0"
                                (click)="removeValue(value)"
                                (keydown)="$event.stopPropagation()"
                        >
                           <lucide-icon name="x" size="14" class="text-gray-600/50 hover:text-gray-600"></lucide-icon>
                          </button>
                      }
                </button>
        }
    <ng-content></ng-content>
  </span>
</fibo-form-field>
<fibo-form-field-errors [control]="formFieldControl" ></fibo-form-field-errors>

@if (trigger.isOpen() && items().length) {
  <fibo-listbox fiboPopover
               class="fibo-popover rounded-md max-h-70 overflow-y-auto"
               [popoverTrigger]="trigger"
               [fullPopoverWidth]="true"
               [(MultipleSelectionModel)]="value"
               [items]="items()"
               [valueProp]="valueProp()"
               [labelProp]="labelProp()"
               [itemTemplate]="itemTemplate()"
  ></fibo-listbox>
}
