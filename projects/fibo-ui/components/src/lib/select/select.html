<fibo-form-field
  [control]="formFieldControl"
  appendIcon="chevron-down"
  fiboPopoverTriggerClick #trigger="PopoverTrigger">
  <ng-content>
    @if(currentSelectedItem()) {
      @if (itemTemplate(); as template) {
        <ng-container [ngTemplateOutlet]="template" [ngTemplateOutletContext]="{ $implicit: currentSelectedItem() }"></ng-container>
      } @else {
        <span class=" truncate">
         {{ getLabel(currentSelectedItem()!) }}
        </span>
      }
    }
  </ng-content>

</fibo-form-field>

<fibo-form-field-errors [control]="formFieldControl" ></fibo-form-field-errors>

@if (trigger.isOpen()) {
  <div fiboPopover
       fiboDataList
       class="fibo-popover  py-1 px-1 rounded-md"
       [popoverTrigger]="trigger"
       [fullPopoverWidth]="true"
       [(SingleSelectionModel)]="value"
       (optionTriggered)="trigger.close()"
  >
    <div class="flex px-2 space-x-2">
      <lucide-icon name="search" size="16" class="text-tertiary self-center"></lucide-icon>
      <input
        class="w-full  py-1  outline-hidden text-sm  fibo-input"
        placeholder="Search..."
        type="text"
      />
    </div>
    <div class="h-px  bg-black/10  dark:bg-white/10 my-1 mx-1"></div>
    <div class="max-h-70 overflow-y-auto fibo-scrollbar">
      @for (item of items(); track getValue(item)) {
        <a [Option]="getValue(item)"
           class="datalist-item relative group">
          @if (itemTemplate(); as template) {
            <ng-container [ngTemplateOutlet]="template" [ngTemplateOutletContext]="{ $implicit: item, isSelected: currentSelectedItem() && getValue(currentSelectedItem()!) === getValue(item) }"></ng-container>
          } @else {
            <span class="block truncate font-normal">{{ getLabel(item) }}</span>
          }
        </a>
      }
    </div>

  </div>
}
