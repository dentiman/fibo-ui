<label class="inline-flex items-center gap-2 cursor-pointer select-none"
       [attr.aria-disabled]="disabled()">
  @if (!readonly()) {
    <input
      type="checkbox"
      class="peer sr-only"
      [checked]="checked()"
      [disabled]="disabled()"
      [indeterminate]="indeterminate()"
      (change)="onInputChange($event)"
      (blur)="onBlur()"
    />
  }
  <span class="relative inline-flex items-center justify-center h-4 w-4 rounded border
              transition-colors duration-200 ease-in-out flex-shrink-0
              peer-focus-visible:outline-1 peer-focus-visible:outline-blue-500 dark:peer-focus-visible:outline-blue-400 peer-focus-visible:outline-offset-2
              peer-disabled:opacity-50 peer-disabled:cursor-not-allowed"
        [class.border-gray-300]="!checked()"
        [class.dark:border-neutral-600]="!checked()"
        [class.bg-white]="!checked()"
        [class.dark:bg-transparent]="!checked()"
        [class.bg-blue-500]="checked()"
        [class.border-transparent]="checked()">
    @if (indeterminate()) {
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="white" class="size-4">
        <path d="M3.75 7.25a.75.75 0 0 0 0 1.5h8.5a.75.75 0 0 0 0-1.5h-8.5Z" />
      </svg>
    }
    @else if (checked()) {
      <svg class="absolute size-3.5" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12" />
      </svg>
    }
  </span>
  <span class="text-sm dark:text-neutral-200">
    <ng-content></ng-content>
  </span>
</label>
