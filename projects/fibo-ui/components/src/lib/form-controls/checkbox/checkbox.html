<label class="checkbox-label">
  @if (!readonly()) {
    <input
      type="checkbox"
      class="checkbox-input"
      [checked]="checked()"
      [disabled]="disabled()"
      [indeterminate]="indeterminate()"
      (change)="onInputChange($event)"
      (blur)="onBlur()"
    />
  }

  <span class="checkbox-box">
    @if (indeterminate()) {
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="checkbox-icon">
        <path d="M3.75 7.25a.75.75 0 0 0 0 1.5h8.5a.75.75 0 0 0 0-1.5h-8.5Z" />
      </svg>
    } @else if (checked()) {
      <svg class="checkbox-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12" />
      </svg>
    }
  </span>

  <span class="checkbox-content">
    <ng-content></ng-content>
  </span>
</label>
