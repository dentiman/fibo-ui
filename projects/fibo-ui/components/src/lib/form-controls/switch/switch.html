<label class="switch-label">
  <input
    type="checkbox"
    class="switch-input"
    [checked]="checked()"
    [disabled]="disabled()"
    (change)="onInputChange($event)"
    (blur)="onBlur()"
  />

  <span class="switch-track">
    <span class="switch-thumb">
      @if (isLoading()) {
        <fibo-loading-spin class="switch-loading"></fibo-loading-spin>
      }
    </span>
  </span>

  <span class="sr-only">Toggle</span>
</label>
