<div OverlayPosition
     [referenceElement]="referenceElement()"
     [fullOverlayWidth]="fullOverlayWidth()"
     (clickOutside)="clickOutsideHandle($event)"
     [placement]="placement()"
     class="absolute max-h-90 overflow-y-auto z-10 origin-top-right  rounded-md bg-white shadow-lg ring-1 ring-black/5  focus:outline-hidden">
        @if (content(); as templateRef) {
            <ng-container *ngTemplateOutlet="templateRef"></ng-container>
        }
        <ng-content></ng-content>
</div>
