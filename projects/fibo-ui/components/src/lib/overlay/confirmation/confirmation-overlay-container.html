<ng-template #root>
  @if (confirmation.config()) {
    <div class="fixed inset-0 z-10"
         animate.enter="confirm-enter">

      <div class="confirm-backdrop fixed inset-0 bg-black/30 dark:bg-black/50">
      </div>

      <div class="fixed inset-0 w-screen overflow-y-auto">
        <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
          <div
               fiboOverlayPanel
               class="confirm-content relative overflow-hidden rounded-lg bg-background px-4 pt-5 pb-4 text-left shadow-xl sm:my-8 sm:w-full sm:max-w-lg sm:p-6 dark:outline dark:-outline-offset-1 dark:outline-white/8">
            <ng-container *ngTemplateOutlet="template()"></ng-container>
          </div>
        </div>
      </div>

    </div>
  }
</ng-template>

<ng-template #defaultContent>
  @let data =  content();
  <div class="absolute top-0 right-0 hidden pt-4 pr-4 sm:block">
    <button (click)="confirmation.cancel()" type="button" class="flex-none cursor-pointer rounded-full text-foreground-tertiary hover:text-foreground">
      <span class="sr-only">Close</span>
      <lucide-icon name="X" size="16"></lucide-icon>
    </button>
  </div>
  <div class="sm:flex sm:items-start">
    <div class="mx-auto flex size-12 shrink-0 items-center justify-center rounded-full bg-red-100 dark:bg-red-900/30 sm:mx-0 sm:size-10">
      <svg class="size-6 text-red-600 dark:text-red-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true" data-slot="icon">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg>
    </div>
    <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
      <h3 class="text-base font-semibold text-gray-900 dark:text-white">{{ data.title }}</h3>
      <div class="mt-2">
        <p class="text-sm text-gray-500 dark:text-neutral-400">{{ data.message }}</p>
      </div>
    </div>
  </div>
  <div class="mt-5 sm:mt-4 sm:flex sm:flex-row-reverse">
    <button  (click)="confirmation.confirm()" type="button" class="btn btn-danger w-full sm:ml-3 sm:w-auto">{{  data.confirmLabel }}</button>
    <button  fiboFocusInitial (click)="confirmation.cancel()"  type="button" class="btn mt-3 sm:mt-0 w-full sm:w-auto">{{  data.cancelLabel }}</button>
  </div>
</ng-template>
