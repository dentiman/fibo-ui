@if (confirmation.isOpen()) {
  <div class="relative z-10" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    @if (confirmation.isVisible()) {
      <div class="fixed inset-0 bg-gray-500/75 transition-opacity"></div>
    }

    <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
      <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
        @if (confirmation.isVisible()) {
        <div (clickOutside)="confirmation.close()" class="relative transform overflow-hidden rounded-lg bg-white px-4 pt-5 pb-4 text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg sm:p-6">
          <ng-container *ngTemplateOutlet="template()"></ng-container>
        </div>
        }
      </div>
    </div>
  </div>
}

<ng-template #defaultContent>
  @let data =  content();
  <div class="absolute top-0 right-0 hidden pt-4 pr-4 sm:block">
    <button (click)="confirmation.cancel()" type="button" class="rounded-md bg-white text-gray-400 hover:text-gray-500 focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:outline-hidden">
      <span class="sr-only">Close</span>
      <svg class="size-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true" data-slot="icon">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
  <div class="sm:flex sm:items-start">
    <div class="mx-auto flex size-12 shrink-0 items-center justify-center rounded-full bg-red-100 sm:mx-0 sm:size-10">
      <svg class="size-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true" data-slot="icon">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg>
    </div>
    <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
      <h3 class="text-base font-semibold text-gray-900" id="modal-title">{{  data.title }}</h3>
      <div class="mt-2">
        <p class="text-sm text-gray-500">{{ data.message }}</p>
      </div>
    </div>
  </div>
  <div class="mt-5 sm:mt-4 sm:flex sm:flex-row-reverse">
    <button  (click)="confirmation.confirm()" type="button" class="inline-flex w-full justify-center rounded-md bg-red-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-red-500 sm:ml-3 sm:w-auto">{{  data.confirmLabel }}</button>
    <button  (click)="confirmation.cancel()"  type="button" class="mt-3 inline-flex w-full justify-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-xs ring-1 ring-gray-300 ring-inset hover:bg-gray-50 sm:mt-0 sm:w-auto">{{  data.cancelLabel }}</button>
  </div>
</ng-template>
