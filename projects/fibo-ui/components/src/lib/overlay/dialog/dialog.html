@if (state.isOpen()) {
  <div class="relative z-10" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    @if (state.isVisible()) {
      <div [@backdropAnimation] class="fixed inset-0 bg-gray-500/75 transition-opacity"></div>
    }

    @if (isDrawerMode()) {
      <div class="fixed inset-0 overflow-hidden">
        <div class="absolute inset-0 overflow-hidden">
          <div class="pointer-events-none fixed inset-y-0 right-0 flex max-w-full pl-10">
            @if (state.isVisible()) {
              <div (clickOutside)="state.close()"
                   [@slideInRight]
                   [@slideOutRight]
                   class="pointer-events-auto w-screen max-w-md">
                <div class="flex h-full flex-col overflow-y-scroll bg-white py-6 shadow-xl">
                  <div class="relative flex-1 px-4 sm:px-6">
                    <ng-container *ngTemplateOutlet="state.content()"></ng-container>
                  </div>
                </div>
              </div>
            }
          </div>
        </div>
      </div>
    } @else {
      <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
        <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
          @if (state.isVisible()) {
            <div [@modalAnimation] (clickOutside)="state.close()"
                 class="relative rounded-lg bg-white px-4 pb-4 pt-5 text-left shadow-xl">
              <ng-container *ngTemplateOutlet="state.content()"></ng-container>
            </div>
          }
        </div>
      </div>
    }
  </div>


}
