@let value  = control?.value;
@let status = control?.statusChanges | async;
@if ((value | isEmpty) || status === 'DISABLED' ) {
    <ng-container [ngTemplateOutlet]="controlIcon"></ng-container>
} @else {
  <button
    (click)="onReset()"
    type="button"
    class="rounded-full text-gray-400 hover:bg-gray-200 hidden group-hover:block"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 20 20"
      fill="currentColor"
      class="w-5 h-5"
    >
      <path
        d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"
      />
    </svg>
  </button>
  <span class="group-hover:hidden">
    <ng-container [ngTemplateOutlet]="controlIcon"></ng-container>
  </span>
}

<ng-template #controlIcon>
  <ng-content></ng-content>
</ng-template>
