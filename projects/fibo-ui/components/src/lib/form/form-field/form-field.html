@let empty = value() | isEmpty;

@if (hasErrors()) {
  <div class="backdrop absolute inset-0 pointer-events-none  rounded-md
   bg-gradient-to-r from-red-700/4  from-0% via-red-700/6 via-30%  to-red-700/2 to-100%
    "></div>
}

<div class="flex items-center space-x-2 text-left px-3 py-1.5 relative">
  <ng-content select=".prepend"></ng-content>

  <div class="min-w-0 grow flex flex-col space-y-0">
    <ng-content></ng-content>
  </div>

  @if (!empty && !disabled()) {
    <div>
        <span
          (click)="reset($event)"
          class="
            hidden
            cursor-pointer
            group-hover:block
            group-focus-within:block
            rounded-full  text-foreground-tertiary hover:text-foreground"
        >
          <lucide-icon name="X" size="16" class=""></lucide-icon>
        </span>
      <div class="group-hover:hidden group-focus-within:hidden">
        <ng-container [ngTemplateOutlet]="appendBlock"></ng-container>
      </div>
    </div>

  } @else {
    <ng-container [ngTemplateOutlet]="appendBlock"></ng-container>
  }

  <ng-template #appendBlock>
    <ng-content select=".append"></ng-content>
    @if (appendIcon(); as appendIcon) {
      <lucide-icon [name]="appendIcon" size="16"
                   class="self-center justify-self-end fibo-form-field-icon text-foreground-tertiary"></lucide-icon>
    }
  </ng-template>
</div>

@if (hasErrors()) {
  <ul class="absolute top-full left-0 w-full text-red-400 text-xs pl-3  flex flex-col space-y-1">
    @for (error of errors(); track error) {
      <li>{{ error.kind }}</li>
    }
  </ul>
}
