<label class="inline-flex items-center gap-2 cursor-pointer select-none"
       [attr.aria-disabled]="disabled()">
  <input type="checkbox"
         class="peer sr-only"
         [checked]="checked()"
         [disabled]="disabled()"
         (change)="onInputChange($event)"
         (blur)="onBlur()" />

  <span class="relative inline-flex flex-shrink-0 rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out
                bg-gray-200 dark:bg-neutral-700 peer-checked:bg-blue-500 dark:peer-checked:bg-blue-600
                focus:outline-none peer-focus-visible:ring-1 peer-focus-visible:ring-primary-600 peer-focus-visible:ring-offset-1  peer-disabled:opacity-50 peer-disabled:cursor-not-allowed"
        [class]="trackSize()">
    <span class="pointer-events-none relative inline-block rounded-full bg-white dark:bg-neutral-300 shadow-md ring-0 transition duration-200 ease-in-out"
          [class]="thumbSize() + ' ' + (checked() ? checkedTranslate() : 'translate-x-0')"
          [class.dark:bg-white]="checked()"  >
      @if (isLoading()) {
        <fibo-loading-spin
                           [class.text-gray-300]="!checked()"
                           [class.dark:text-neutral-500]="!checked()"
                           [class.text-blue-500]="checked()"
                           [class]="thumbSize()"></fibo-loading-spin>
      }
    </span>
  </span>
  <span class="sr-only">Toggle</span>
</label>
