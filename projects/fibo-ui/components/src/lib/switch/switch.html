<span [class]="thumbClasses()">
  <span class="opacity-100 duration-200 ease-in absolute inset-0 flex h-full w-full items-center justify-center transition-opacity"
        [class]="{
          'opacity-0 duration-100 ease-out': checked(),
          'opacity-100 duration-200 ease-in': !checked()
        }"
        aria-hidden="true">
    @if (isLoading()) {
      <sui-loading-spin
        [class]="thumbSizeClasses()"
        [class.text-gray-300]=" !checked()"
        [class.text-primary-600]=" checked()"
      ></sui-loading-spin>
    }
