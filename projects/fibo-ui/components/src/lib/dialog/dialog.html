@if (state.isOpen()) {
  <div class="fixed inset-0 z-10"
       animate.enter="dialog-enter"
       animate.leave="dialog-leave">

    <div (click)="state.close()"
         class="dialog-backdrop fixed inset-0 bg-black/30 dark:bg-black/50">
    </div>

    <div tabindex="0"
         class="flex min-h-full items-end justify-center text-center focus:outline-none sm:items-center sm:p-0 py-4">
      <div (click)="$event.stopPropagation()"
           class="dialog-content relative max-h-[90vh] overflow-y-auto rounded-lg bg-background text-left shadow-xl sm:p-2 dark:outline
            dark:-outline-offset-1 dark:outline-white/8 my-4">
        <ng-container *ngTemplateOutlet="state.content()"></ng-container>
      </div>
    </div>

  </div>
}
