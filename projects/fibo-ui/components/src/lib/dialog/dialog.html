@if (state.isOpen()) {
  <div id="dialog" aria-labelledby="dialog-title" class="fixed inset-0 size-auto max-h-none max-w-none overflow-y-auto bg-transparent backdrop:bg-transparent z-10">
    @if (state.isVisible()) {
      <div  class="fixed inset-0 bg-black/30 dark:bg-black/50 transition-opacity data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in "></div>
    }

    @if (isDrawerMode()) {
      <div class="fixed inset-0 overflow-hidden">
        <div class="absolute inset-0 overflow-hidden">
          <div class="pointer-events-none fixed inset-y-0 right-0 flex max-w-full pl-10">
            @if (state.isVisible()) {
              <div (clickOutside)="state.close()"  class="pointer-events-auto w-screen max-w-md shadow-xl">
                <div class="flex h-full  flex-col overflow-y-scroll bg-background dark:outline dark:-outline-offset-1 dark:outline-white/8">
                    <ng-container *ngTemplateOutlet="state.content()"></ng-container>
                </div>
              </div>
            }
          </div>
        </div>
      </div>
    } @else {
      <div tabindex="0" class="flex min-h-full  items-end justify-center text-center focus:outline-none sm:items-center sm:p-0 py-4">

          @if (state.isVisible()) {
            <div (clickOutside)="state.close()"
                 class="relative transform overflow-y-auto rounded-lg bg-background text-left shadow-xl transition-all data-closed:translate-y-4 data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in  sm:p-2 data-closed:sm:translate-y-0 data-closed:sm:scale-95  dark:outline dark:-outline-offset-1 dark:outline-white/8 my-4">
              <ng-container *ngTemplateOutlet="state.content()"></ng-container>
            </div>
          }

      </div>
    }
  </div>
}
