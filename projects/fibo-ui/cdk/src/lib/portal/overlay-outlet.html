@for (portal of registry.openPortalsList(); track portal.id) {
  <div [attr.data-portal-id]="portal.id"
       [style.z-index]="portal.zIndex"
       style="position: relative"
       (animationend)="handlePortalAnimationEnd(portal.id, $event)"
       animate.leave="overlay-leave">
    <ng-container
      *ngTemplateOutlet="portal.templateRef; injector: portalInjector(portal)"
    ></ng-container>
  </div>
}
